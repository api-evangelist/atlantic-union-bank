aid: atlantic-union-bank
name: Atlantic Union Bank
review:
  question: Does Atlantic Union Bank expose a first-party public developer API or a documented open-finance data-access API?
  answer: false
  date: '2026-07-23'
  reviewer: API Evangelist
findings:
  summary: |
    Atlantic Union Bank publishes no first-party public developer portal and no
    documented public API. Probes of the conventional developer and API hosts
    (developer.atlanticunionbank.com, developers.atlanticunionbank.com,
    api.atlanticunionbank.com) do not resolve (connection code 000), and the
    public site returns 404 for /developers and /api. The homepage and sitemap
    expose only retail banking, investor relations, and helpful-links pages
    (privacy, terms of use, security & fraud center, contact) — no API
    reference, no SDKs, no downloadable OpenAPI/Swagger, and no sandbox.

    Consistent with the voluntary, fragmented US open-finance landscape (no
    single mandated open-banking contract), consumer-permissioned account and
    transaction data appears to be available only INDIRECTLY through third-party
    aggregators — Plaid, Finicity (by Mastercard), MX, and Teller — as listed in
    external aggregator coverage directories, not via any first-party bank API.
    No direct FDX-conformant data-access endpoint, Akoya Data Access Network
    participation, or published CFPB Section 1033 (Personal Financial Data
    Rights) posture was found on the bank's own properties. Because there is no
    documented first-party surface, no authentication model (OAuth2/OIDC,
    API-key, or mTLS) could be confirmed, and no specification could be
    harvested. This is an honest identity-only, aggregator-only record.
