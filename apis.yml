name: Atlantic Union Bank
kind: company
description: >-
  Atlantic Union Bank is a Virginia state-chartered commercial bank with roots
  going back to 1902, and the principal banking subsidiary of Atlantic Union
  Bankshares Corporation (NYSE: AUB), a Richmond, Virginia bank holding company
  regulated under the Bank Holding Company Act of 1956. It is the largest
  regional bank headquartered in Virginia, with roughly $37 billion in assets
  and a branch network across Virginia, Maryland, and North Carolina, offering
  consumer and business checking, savings, lending, mortgages, credit cards, and
  wealth management. Like most US regional banks, Atlantic Union Bank operates
  under the voluntary, fragmented US open-finance landscape rather than a
  mandated open-banking regime: it publishes no first-party public developer
  portal or documented public API. Consumer-permissioned account and transaction
  data is reached indirectly through third-party data aggregators (Plaid,
  Finicity by Mastercard, MX, Teller) as surfaced by aggregator coverage
  directories, and no direct FDX-conformant data-access endpoint, Akoya
  participation, or published CFPB Section 1033 posture was found. This is an
  identity-only, aggregator-only record with no first-party API surface.
